name: drinkly
description: "Modern water tracker for iOS & Android."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.12.2 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^3.0.3

  # Navigation
  go_router: ^16.0.0

  # Database
  drift: ^2.28.1
  sqlite3_flutter_libs: ^0.5.39
  path_provider: ^2.1.5
  path: ^1.9.1

  # UI
  google_fonts: ^6.3.1
  flutter_animate: ^4.5.2

  # Date & Time
  intl: ^0.20.2
  timezone: ^0.10.1

  # Notifications
  flutter_local_notifications: ^19.4.0
  flutter_timezone: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  build_runner: ^2.7.0
  drift_dev: ^2.28.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/