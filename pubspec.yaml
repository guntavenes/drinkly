name: drinkly
description: "Modern water tracker for iOS & Android."
publish_to: "none"

version: 1.0.0+2

environment:
  sdk: ">=3.12.2 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  confetti: ^0.8.0
  package_info_plus: ^8.3.1
  share_plus: ^11.1.0
  url_launcher: ^6.3.2

  flutter_riverpod: ^3.0.3
  go_router: ^16.0.0

  drift: ^2.28.1
  sqlite3_flutter_libs: ^0.5.39
  path_provider: ^2.1.5
  path: ^1.9.1

  google_fonts: ^6.3.1
  flutter_animate: ^4.5.2

  intl: ^0.20.2
  timezone: ^0.10.1

  fl_chart: ^1.0.0

  flutter_local_notifications: ^19.4.0
  flutter_timezone: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.6
  flutter_lints: ^6.0.0
  build_runner: ^2.7.0
  drift_dev: ^2.28.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

flutter_native_splash:
  color: "#EAF7FF"
  color_dark: "#020617"

  android_12:
    color: "#EAF7FF"
    color_dark: "#020617"

  ios: true
  android: true
  web: false

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/app_icon1.png
  remove_alpha_ios: true